<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <title>CoCoSol - Services</title>
</head>

<body class="bg-gray-800 text-white">

    <!-- Navigation Bar -->
    <nav class="bg-gray-900 p-4">
        <div class="container mx-auto flex items-center justify-between">
            <!-- Logo -->
            <img src="assets/logo.svg" alt="Your Logo" class="h-8 w-8">

            <!-- Site Name -->
            <a href="#" class="font-bold text-lg">CoCoSol</a>

    <!-- Services Section -->

    <section id="services" class="container mx-auto my-8 flex flex-wrap justify-center">

        <!-- The list of services will be dynamically loaded here -->

    </section>

    <!-- Projects Section -->
    <h1 class="text-3xl font-semibold mb-4 text-center mt-8">My Projects</h1>
    <section id="projects" class="container mx-auto my-8 flex flex-wrap justify-center">

        <!-- The list of projects will be dynamically loaded here -->

    </section>

    <!-- Links to other pages -->
    <div class="container mx-auto text-center">
        <a href="about.html"
            class="bg-blue-500 text-white px-4 py-2 rounded-full mt-8 inline-block hover:bg-blue-700 transition-colors">About

    <script src="services/services.js"></script>

</html>
